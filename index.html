<!doctype html>
<html lang="en">
  <head>
    <title>BCIT map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.ico" type="image/app-icon" />

    <!-- Site navbar and footer components -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body class="body-bg">
    <site-navbar></site-navbar>

    <main class="container-fluid map-body">
      <!-- alert message for the user when outside the campus -->
      <div id="campus-alert" class="alert alert-warning d-none" role="alert">
        You are outside BCIT campus.
      </div>

      <!-- changed the height from 800px to fix the user redirecting bug -->
      <div id="map" style="width: 100%; height: 87vh"></div>
    </main>

    <site-footer></site-footer>

    <!-- Link to scripts of your own -->
    <script type="module" src="./src/js/map.js"></script>
  </body>
</html>
