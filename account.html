    <!-- PROFILE SCREEN -->
    <div class="phone profile">
      <form action="#" method="POST">
        <div class="profile-header">
          <div class="avatar"></div>
        </div>

        <div class="profile-item">
          <label>Profile Name</label>
          <input type="text" id="name" name="name" value="Lionel Messi" />
        </div>

        <div class="profile-item">
          <label>Favourite Club</label>
          <input type="text" id="club" name="club" value="Argentina" />
        </div>

        <div class="profile-item">
          <label>Username</label>
          <input
            type="email"
            id="email"
            name="email"
            value="lmessi@gmail.com"
          />
        </div>

        <div class="profile-item">
          <label>Password</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Enter new password"
          />
        </div>

        <div class="profile-buttons">
          <button id="saveChangesBtn" type="submit" class="btn-edit">
            Save Changes
          </button>
          <button id="logoutBtn" type="button" class="btn-logout">
            Log out
          </button>
        </div>
      </form>
