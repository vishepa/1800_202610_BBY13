<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account page</title>
    <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap"
    rel="stylesheet"
    />
    <link
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/account-styles.css" />

    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>
  <body>
    <!-- login paged code removed from here -->

    <!-- PROFILE SCREEN -->
    <site-navbar></site-navbar>
    <main class="container my-4">

      <div class="phone profile">
        <form action="#" method="POST" autocomplete="off">
          <div class="profile-header">
            <!-- <div class="avatar"></div> -->
          </div>
  
          <div class="profile-item first-profile">
            <label>Profile Name</label>
            <input type="text" id="name" name="name" value="" disabled />
          </div>
  
          <div class="profile-item">
            <label>Favourite Club</label>
            <input type="text" id="club" name="club" value="" disabled />
          </div>
  
          <div class="profile-item">
            <label>Username</label>
            <input
              type="email"
              id="email"
              name="email"
              value=""
              autocomplete="off"
              disabled
            />
          </div>
  
          <div class="profile-item">
            <label>Password</label>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Enter new password"
              autocomplete="new-password"
              disabled
            />
          </div>
  
          <div class="profile-buttons">
            <button id="saveChangesBtn" type="button" class="btn-edit">
              Save Changes
            </button>
            <button id="logoutBtn" type="button" class="btn-logout">
              Log out
            </button>
          </div>
        </form>
        <div class="bottom-nav">

        </div>
      </div>
    </main>

    <site-footer></site-footer>

    
    <script type="module" src="/src/js/account.js"></script>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/firebaseConfig.js"></script>
    <script type="module" src="/src/js/authentication.js"></script>
    <script type="module" src="/src/js/loginSignup.js"></script>
  </body>
</html>
