<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account page</title>
    <link rel="stylesheet" href="styles/account-styles.css" />
    <!-- <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap"
      rel="stylesheet"
    /> -->
  </head>
  <body>
    <!-- 	login and profile -->

    <div class="phone login">
      <h2>Login</h2>

      <div class="input-group">
        <input type="email" placeholder="abcde@gmail.com" />
      </div>

      <div class="input-group">
        <input type="password" placeholder="••••••••" />
      </div>

      <div class="no-account"><a href="">Haven't signed up?</a></div>

      <button class="btn-login">Sign In</button>
    </div>

    <!-- PROFILE SCREEN -->
    <div class="phone profile">
      <form action="#" method="POST">
        <div class="profile-header">
          <div class="avatar"></div>
        </div>

        <div class="profile-item">
          <label>Profile Name</label>
          <input type="text" name="fullname" value="Lionel Messi" />
        </div>

        <div class="profile-item">
          <label>Favourite Club</label>
          <input type="text" name="club" value="Argentina" />
        </div>

        <div class="profile-item">
          <label>Username</label>
          <input type="email" name="username" value="lmessi@gmail.com" />
        </div>

        <div class="profile-item">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter new password"
          />
        </div>

        <div class="profile-buttons">
          <button type="submit" class="btn-edit">Save Changes</button>
          <button type="button" class="btn-logout">Log out</button>
        </div>
      </form>
      <div class="bottom-nav">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="30"
          height="30"
          fill="currentColor"
          class="bi bi-house-door-fill"
          viewBox="0 0 16 16"
        >
          <path
            d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5"
          />
        </svg>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="30"
          height="30"
          fill="currentColor"
          class="bi bi-people-fill"
          viewBox="0 0 16 16"
        >
          <path
            d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5"
          />
        </svg>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="30"
          height="30"
          fill="currentColor"
          class="bi bi-person-fill"
          viewBox="0 0 16 16"
        >
          <path
            d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"
          />
        </svg>
      </div>
    </div>
  </body>
</html>
