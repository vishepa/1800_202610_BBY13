<!doctype html>
<html lang="en">

<head>
  <title>TheShortCut</title>
  <meta name="TheShortCut" content="My 1800 App" />

  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Other libraries go here -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />

  <!-- Web Components for shared navbar and footer layout -->
  <script type="module" src="/src/components/site-navbar.js"></script>
  <script type="module" src="/src/components/site-footer.js"></script>
</head>

<body>
  <!------------------------------>
  <!-- Your HTML Layout go here -->
  <!------------------------------>

  <!-- our own navbar goes here -->
  <site-navbar></site-navbar>

  <!-- Main content goes here -->
  <!-- modified the height of the main-part here -->
  <div class="container py-5" style="max-width: 420px;height: 90vh;">
    <!-- Alerts -->
    <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>



    </div>

    <!-- Signup -->
    <div id="signupView" class="d-none">
      <h3 class="mb-3 text-center">Sign Up</h3>
      <form id="signupForm" novalidate>
        <div class="mb-3">
          <input type="text" id="signupName" class="form-control" placeholder="First and Last Name"
            aria-label="Full name" required />
        </div>
        <div class="mb-3">
          <input type="email" id="signupEmail" class="form-control" placeholder="Email" required />
        </div>
        <div class="mb-3">
          <input type="password" id="signupPassword" class="form-control" placeholder="Password" required />
        </div>
        <button type="submit" class="btn btn-success w-100">
          Create Account
        </button>
      </form>
      <small class="d-block mt-3 text-center">
        Already have an account?
        <a href="#" id="toLogin">Login</a>
      </small>
    </div>
  </div>

  <!-- our own footer goes here -->
  <site-footer></site-footer>
  <!---------------------------------------------->
  <!-- Your own JavaScript scripts go here      -->
  <!---------------------------------------------->

  <script type="module" src="/src/main.js"></script>

  <!-- Firebase related scripts -->

  <script type="module" src="/src/firebaseConfig.js"></script>
  <script type="module" src="/src/authentication.js"></script>
  <script type="module" src="/src/loginSignup.js"></script>
</body>

</html>
