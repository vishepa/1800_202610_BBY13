<!doctype html>
<html>
  <head>
    <title>Bc place map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-info">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Find your way</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <p>&#9786;</p>
            </li>
            <li class="nav-item">
              <button
                type="button"
                class="btn btn-info d-flex align-items-center"
                onclick="window.location.href = './index.html'"
              >
                <span class="material-icons me-1">arrow_back</span>
                Back to Home
              </button>
            </li>
          </ul>

          <form class="d-flex">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>
    <div class="container text-center my-4">
      <div class="map-wrapper">
        <img
          src="./images/bcit_burnabymap.jpg"
          class="img-fluid rounded shadow"
          alt="BC Place Map"
        />

        <div class="food-spot" id="spot-1">
          <span class="material-icons text-warning">stars</span>
          <span class="badge bg-dark">The stand</span>
        </div>

        <div class="food-spot" id="spot-2">
          <span class="material-icons text-warning">stars</span>
          <span class="badge bg-dark">The stand</span>
        </div>

        <div class="food-spot" id="spot-3">
          <span class="material-icons text-warning">stars</span>
          <span class="badge bg-dark">The stand</span>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
