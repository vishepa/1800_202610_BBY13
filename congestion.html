<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Congestion Page</title>

    <!-- Load Vite entry file -->
    <script type="module" src="/src/main.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- Web Components -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 congestion-bg">

    <!-- Reusable Navbar -->
    <site-navbar></site-navbar>

    <!-- Page Content -->
    <main class="flex-fill container my-4 ">
        <div class="input-group mb-3">
            <span class="input-group-text">
                <span class="material-icons">search</span>
            </span>
            <input type="text" class="form-control" placeholder="Search Cafes, Exits, ..." aria-label="Search cafes">
        </div>
        <div class="text-center mb-4 heading-spacing">
            <h4 class="fw-bold">Looks like you are near some of the Cafes!</h4>
            <p class="text-muted">Here are the latest updates</p>
        </div>
        <div class="mb-3 shadow-sm card-bg">
            <div class="row g-0 align-items-center">

                <!-- Image Column -->
                <div class="col-4">
                    <div class="cafe-img-wrapper rounded-start">
                        <img src="./images/delicious-burger-studio.jpg" alt="Tim Hortons">
                    </div>
                </div>

                <!-- Text Column -->
                <div class="col-8">
                    <div class="card-body card-spacing">
                        <h5 class="card-title title-spacing">Triple O's</h5>

                        <p class="mb-1">
                            <strong>Distance:</strong> 150m away
                        </p>

                        <p class="mb-1">
                            <strong>Crowd Level:</strong>
                            <span class="text-danger">Busy</span>
                        </p>

                        <p class="mb-0">
                            <strong>Expected Wait Time:</strong> 10–15 mins
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Reusable Footer -->
    <site-footer></site-footer>

</body>

</html>
