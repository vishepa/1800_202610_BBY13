<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Congestion Page</title>

    <!-- Load Vite entry file -->
    <script type="module" src="/src/main.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- Web Components -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 congestion-bg">

    <!-- Reusable Navbar -->
    <site-navbar></site-navbar>

    <!-- Page Content -->
    <main class="flex-fill container my-4 ">
        <div class="d-flex justify-content-between align-items-center mb-3 gap-3">
            <div class="input-group flex-grow-1">
                <span class="input-group-text">
                    <span class="material-icons">search</span>
                </span>
                <input type="text" class="form-control" placeholder="Search Cafes, Exits, ..." aria-label="Search cafes">
            </div>
            <div class="recents-toggle-wrapper">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="recents-toggle" role="switch">
                    <label class="form-check-label" for="recents-toggle">
                        Recents
                    </label>
                </div>
            </div>
        </div>
        <div class="text-center mb-4 heading-spacing">
            <h4 class="fw-bold">Looks like you are near some of the Cafes!</h4>
            <p class="text-muted">Here are the latest updates</p>
        </div>
        <div id="locations-go-here" class="location-tiles w-100 d-flex flex-column gap-3 p-3 rounded" >

        </div>
        <template id="tile-template">
            <div class="tile-row card-bg d-flex flex-column gap-3 p-3 rounded">

                <!-- Image Column -->
                <div class="d-flex flex-row gap-3 align-items-center">
                    <div id="img-wrapper" class="cafe-img-wrapper rounded-start w-25">
                        <!-- Image will be inserted here -->
                    </div>
    
                    <!-- Text Column -->
                    <div class="col-8">
                        <div class="card-body card-spacing">
                            <h5 id="card-title" class="card-title title-spacing">Triple O's</h5>
    
                            <p id="card-distance" class="mb-1">
                                <strong>Distance:</strong> 150m away
                            </p>
    
                            <p class="mb-1">
                                <strong>Crowd Level:</strong>
                                <span id="card-current-congestion" class="text-danger">Busy</span>
                            </p>
    
                            <p class="mb-0">
                                <strong>Expected Wait Time: </strong><span id="card-expected-wait-time"> 10–15 mins</span> 
                            </p>
                        </div>
                    </div>
    
                </div>
                <div class="collapse location-collapse w-100 gap-1 align-items-center">
                    <div class="card card-body w-100">
                        <h4>Triple O's</h4>
                        <h5> 150m away</h5>
                        <h5> Crowd Level: Busy</h5>
                        <h5> Expected Wait Time: 10–15 mins</h5>
    
                        <button type="button" class="btn confirm btn-primary w-25 gap-1 m-2">Confirm Wait Time</button>

                        <h4 class="confirm-msg"> Thanks for Confirming! </h4>
    
                        <button type="button" class="btn update btn-primary w-25 gap-1 m-2">Update Wait Time</button>
                        <div class="collapse update-collapse w-50 gap-1 align-items-center">
                            <div class="card card-body w-100">
                                <div class="button-container">
                                    <button type="button" class="btn btn-secondary w-25 gap-1 m-2">5 mins</button>
                                    <button type="button" class="btn btn-secondary w-25 gap-1 m-2">10 mins</button>
                                    <button type="button" class="btn btn-secondary w-25 gap-1 m-2">15 mins</button>
    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </template>
            
        
    </main>

    <!-- Reusable Footer -->
    <site-footer></site-footer>

    <script type="module" src="/src/eachLocation.js"></script>
</body>

</html>
